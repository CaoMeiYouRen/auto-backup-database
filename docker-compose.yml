version: "3"

services:
  app:
    container_name: "auto-backup-database"
    image: ${DOCKER_IMAGE:-caomeiyouren/auto-backup-database}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      # 配置文件和环境变量路径优先级最高，可以在这里指定
      - CONFIG_PATH=/app/config/config.yml
      - ENV_PATH=/app/config/.env
    volumes:
      # 配置文件目录
      - ./config:/app/config:ro
      # 本地备份输出
      - ./backups:/app/backups
      # 需要备份的数据库根目录，建议统一挂载到 /app/data 下，并在 config.yml 中使用相对/绝对路径
      - /path/to/your/databases:/app/data:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
