# 数据库自动备份配置示例
# 复制此文件为 config.yml 并根据实际情况修改

oss:
  region: "${OSS_REGION}"
  accessKeyId: "${OSS_ACCESS_KEY_ID}"
  accessKeySecret: "${OSS_ACCESS_KEY_SECRET}"
  bucket: "${OSS_BUCKET}"
  endpoint: "${OSS_ENDPOINT}"

security:
  backupPassword: "${BACKUP_PASSWORD}"

projects:
  - name: my-app-db
    dbType: sqlite
    dbPath: "/data/apps/my-app/*.db" # 支持 Glob 语法
    backupSchedule: "0 2 * * *" # 每天凌晨 2 点
    compress:
      enabled: true
      password: true # 使用环境变量中的 BACKUP_PASSWORD 加密
    retention:
      local:
        days: 7
        maxSize: 2GB
      remote:
        days: 30
        maxSize: 10GB
    options:
      localEnabled: true
      remoteEnabled: true

  - name: mongo-prod
    dbType: mongodb
    connection:
      uri: "${MONGODB_URI}"
      database: "${MONGODB_DATABASE:-app}"
    dumpOptions:
      archive: true
      authenticationDatabase: "${MONGODB_AUTH_DB:-admin}"
      extraArgs: []
    backupSchedule: "0 3 * * *"
    compress:
      enabled: true
      password: true
    retention:
      local:
        days: 7
        maxSize: 5GB
      remote:
        days: 30
        maxSize: 20GB
    options:
      localEnabled: true
      remoteEnabled: true

# 通知配置（可选）
notify:
  enabled: true
  type: Dingtalk # 支持多种推送方式，详见 push-all-in-one
  config:
    DINGTALK_ACCESS_TOKEN: "${DINGTALK_ACCESS_TOKEN}"
    DINGTALK_SECRET: "${DINGTALK_SECRET}"
  option:
    msgtype: markdown
